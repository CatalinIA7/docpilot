<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DocPilot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="shell">
    <section id="auth-view" class="auth-card">
      <div class="brand-mark">D</div>
      <h1>DocPilot</h1>
      <p>Secure document workspace</p>
      <div class="tabs"><button id="login-tab" class="active">Log in</button><button id="register-tab">Create account</button></div>
      <form id="auth-form">
        <label>Email<input id="email" type="email" required autocomplete="email"></label>
        <label>Password<input id="password" type="password" required minlength="8" autocomplete="current-password"></label>
        <button id="auth-submit" type="submit">Log in</button>
      </form>
      <p id="auth-error" class="error" role="alert"></p>
    </section>

    <section id="app-view" class="app hidden">
      <aside class="sidebar">
        <div class="brand"><div class="brand-mark">D</div><div><strong>DocPilot</strong><small>Document workspace</small></div></div>
        <button id="upload-button" class="primary">+ Upload document</button>
        <input id="file-input" type="file" accept=".docx,.pdf" hidden>
        <div id="drop-zone" class="drop-zone" tabindex="0"><strong>Drop DOCX or PDF</strong><span>Maximum 10 MB</span></div>
        <div class="account"><span id="user-email"></span><button id="logout-button">Log out</button></div>
      </aside>
      <section class="workspace">
        <header><div><span class="eyebrow">Library</span><h1>Your documents</h1></div><span id="document-count" class="badge">0 documents</span></header>
        <div id="notice" class="notice hidden"></div>
        <div id="document-list" class="document-grid"></div>
        <div id="empty-state" class="empty-state"><h2>No documents yet</h2><p>Upload a DOCX or PDF to extract and store its text.</p></div>
      </section>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
