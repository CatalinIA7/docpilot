name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create CI environment file
        run: sh scripts/create-ci-env.sh

      - name: Audit backend dependencies
        run: |
          python -m pip install --disable-pip-version-check pip-audit==2.10.1
          python -m pip_audit -r backend/requirements.txt --progress-spinner off

      - name: Apply and validate database migrations
        run: |
          docker compose --env-file .env.ci run --rm migrate
          docker compose --env-file .env.ci run --rm migrate alembic check

      - name: Run backend test suite in Docker
        run: docker compose --env-file .env.ci run --rm backend pytest

      - name: Show service logs after failure
        if: failure()
        run: docker compose --env-file .env.ci logs --no-color db migrate backend

      - name: Clean up test containers and volumes
        if: always()
        run: docker compose --env-file .env.ci down --volumes --remove-orphans

  docker-validation:
    name: Docker validation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create CI environment file
        run: sh scripts/create-ci-env.sh

      - name: Validate Compose configuration
        run: docker compose --env-file .env.ci config

      - name: Build backend and frontend images
        run: docker compose --env-file .env.ci build backend frontend
